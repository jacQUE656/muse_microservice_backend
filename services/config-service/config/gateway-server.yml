server:
  port: 7000

spring:
  application:
    name: gateway-server

  cloud:
    gateway:
      # REQUIRED for spring-cloud-starter-gateway-server-webflux
      server:
        webflux:
          routes:
            - id: USER-SERVICE
              uri: lb://USER-SERVICE
              predicates:
                - Path=/api/users/**
              filters:
                - name: GatewayAuthFilter
                  args:
                    allowedRoles: USER,ADMIN,PREMIUM_USER

            - id: AUTH-SERVICE
              uri: lb://USER-SERVICE
              predicates:
                - Path=/api/auth/**

            - id: USER-SERVICE-ADMIN
              uri: lb://USER-SERVICE
              predicates:
                - Path=/api/admin/users/**
              filters:
                - name: GatewayAuthFilter
                  args:
                    allowedRoles: ADMIN

            - id: ALBUM-SERVICE-ADMIN
              uri: lb://ALBUM-SERVICE
              predicates:
                - Path=/api/admin/albums/**
              filters:
                - name: GatewayAuthFilter
                  args:
                    allowedRoles: ADMIN

            - id: ALBUM-SERVICE-PREMIUM
              uri: lb://ALBUM-SERVICE
              predicates:
                - Path=/api/premium/albums/**
              filters:
                - name: GatewayAuthFilter
                  args:
                    allowedRoles: PREMIUM_USER

            - id: ALBUM-SERVICE-USER
              uri: lb://ALBUM-SERVICE
              predicates:
                - Path=/api/albums/**
              filters:
                - name: GatewayAuthFilter
                  args:
                    allowedRoles: USER,ADMIN,PREMIUM_USER

            - id: SONG-SERVICE-USER
              uri: lb://SONG-SERVICE
              predicates:
                - Path=/api/songs/**
              filters:
                - name: GatewayAuthFilter
                  args:
                    allowedRoles: USER,ADMIN,PREMIUM_USER

            - id: SONG-SERVICE-ADMIN
              uri: lb://SONG-SERVICE
              predicates:
                - Path=/api/admin/songs/**
              filters:
                - name: GatewayAuthFilter
                  args:
                    allowedRoles: ADMIN

            - id: SONG-SERVICE-PREMIUM
              uri: lb://SONG-SERVICE
              predicates:
                - Path=/api/premium/songs/**
              filters:
                - name: GatewayAuthFilter
                  args:
                    allowedRoles: PREMIUM_USER

      # Disabled: manual routes above already cover every service.
      # Leaving this enabled would expose auto-generated routes like
      # /album-service/** that bypass GatewayAuthFilter entirely.
      discovery:
        locator:
          enabled: false
          lower-case-service-id: true

      httpclient:
        connect-timeout: 3000
        response-timeout: 10s

eureka:
  instance:
    prefer-ip-address: true
  client:
    fetch-registry: true
    register-with-eureka: true

jwt:
  access-token-expiration: 86400000
  refresh-token-expiration: 604800000