server:
  port: 7000

spring:
  application:
    name: gateway-server

  cloud:
    gateway:
      # REQUIRED for spring-cloud-starter-gateway-server-webflux
      server:
        webflux:
          routes:
            - id: USER-SERVICE
              uri: lb://USER-SERVICE
              predicates:
                - Path=/api/users/**
              filters:
                - name: GatewayAuthFilter
                  args:
                    allowedRoles: USER,ADMIN,PREMIUM_USER

            - id: AUTH-SERVICE
              uri: lb://USER-SERVICE
              predicates:
                - Path=/api/auth/**

            - id: USER-SERVICE
              uri: lb://USER-SERVICE
              predicates:
                - Path=/api/admin/users/**
              filters:
                - name: GatewayAuthFilter
                  args:
                    allowedRoles: ADMIN
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

eureka:
  instance:
    prefer-ip-address: true
  client:
    fetch-registry: true
    register-with-eureka: true

jwt:
  access-token-expiration: 86400000
  refresh-token-expiration: 604800000

