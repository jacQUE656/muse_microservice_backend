server:
  port: 1002

spring:
  application:
    name: user-service

  datasource:
    # 🔌 Appended auto-create flag and environmental safety fallbacks
    url: jdbc:mysql://localhost:3306/${USER_DB:muse_user_db}?createDatabaseIfNotExist=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:dummy_id}
            client-secret: ${GOOGLE_CLIENT_SECRET:dummy_secret}
            scope:
              - profile
              - email

logging:
  level:
    org:
      springframework:
        security: DEBUG
      hibernate:
        SQL: DEBUG

eureka:
  instance:
    prefer-ip-address: true
  client:
    fetch-registry: true
    register-with-eureka: true

# 🔐 Custom Security Properties Block
jwt:
  access-token-expiration: 86400000     # 24 hours in milliseconds
  refresh-token-expiration: 604800000   # 7 days in milliseconds

# 📧 Structured as a clean list for effortless @ConfigurationProperties binding
disposable:
  emails:
    - 10minutemail
    - 20minutemail
    - 33mail
    - 5ymail
    - anonbox
    - mailinator
    - mailnesia
    - throwawaymail
    - yopmail
    - trashmail
    - temp-mail
    - tempmail
    - moakt
    - guerrillamail