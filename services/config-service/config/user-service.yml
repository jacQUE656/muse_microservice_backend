server:
  port: 1002

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/${USER_DB}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    hibernate:
      ddl-auto: update

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  # FIXED: Integrated seamlessly into the 'spring:' tree hierarchy
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            # FIXED: Set up scopes as a clean YAML list structure
            scope:
              - profile
              - email

logging:
  level:
    org:
      springframework:
        security: DEBUG
      hibernate:
        SQL: DEBUG

eureka:
  instance:
    prefer-ip-address: true
  client:
    fetch-registry: true
    register-with-eureka: true

jwt:
  access-token-expiration: 86400000
  refresh-token-expiration: 604800000

disposable-email: 10minutemail, 20minutemail, 33mail, 5ymail, anonbox, mailinator, mailnesia, throwawaymail, yopmail,trashmail,temp-mail,tempmail,moakt, querillamail