server:
  port: 1001

spring:
  datasource:
    # 🔌 Appended safety flag to auto-create the database if missing
    url: jdbc:mysql://localhost:3306/${ALBUM_DB:muse_album_db}?createDatabaseIfNotExist=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver